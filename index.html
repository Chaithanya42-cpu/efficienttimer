<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Pro: Persistent Career</title>
    <style>
        :root {
            --bg-color: #064e3b;
            --court-bg: #065f46;
            --line-color: #ffffff;
            --active-color: #fbbf24;
            --hit-color: #10b981;
            --accent: #fbbf24;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            color: #ecfdf5;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.8s ease;
        }

        /* CAREER STATS PANEL */
        .career-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .stat-item { text-align: center; min-width: 90px; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: var(--accent); }
        .val { font-size: 1.3rem; font-weight: bold; }

        .main-layout {
            display: flex;
            width: 98vw;
            max-width: 1500px;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .court {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            background: var(--line-color);
            padding: 5px;
            border: 4px solid var(--line-color);
            width: 100%;
            aspect-ratio: 12 / 4;
        }

        .cell { background-color: var(--court-bg); transition: background-color 0.2s; }
        .cell.active { background-color: var(--active-color) !important; box-shadow: 0 0 25px var(--active-color); z-index: 5; }
        .cell.hit { background-color: var(--hit-color) !important; }

        .reward-reel-container {
            width: 140px;
            height: 400px;
            background: #000;
            border: 3px solid var(--accent);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        #rewardReel {
            display: flex;
            flex-direction: column-reverse; 
            transition: transform 1s ease-in-out;
            align-items: center;
            position: absolute;
            bottom: 0; width: 100%;
        }

        .reward-item { width: 110px; height: 110px; margin: 10px 0; opacity: 0.2; }
        .reward-item.current { opacity: 1; transform: scale(1.1); border: 2px solid var(--accent); border-radius: 10px; }
        .reward-item img { width: 100%; height: 100%; object-fit: contain; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        button { padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: var(--hit-color); color: #fff; }
        .reset-btn { background: #ef4444; font-size: 0.6rem; padding: 5px 10px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="infoModal" class="modal">
        <h1 id="modalTitle" style="color:var(--accent); font-size:3rem;">LEVEL UP</h1>
        <img id="modalImg" src="" style="width:250px; height:250px; background:#fff; margin:20px; border-radius:20px;">
        <h2 id="modalSub" style="color:#fff;"></h2>
        <button onclick="closeModal()">RESUME MATCH</button>
    </div>

    <div class="career-stats">
        <span>TOTAL CAREER TIME: <b id="totalTime">0s</b></span> | 
        <span>TOTAL MISSES: <b id="totalMisses">0</b></span> |
        <span>LIFETIME POINTS: <b id="lifePoints">0</b></span>
        <button class="reset-btn" onclick="resetAllData()">RESET DATA</button>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><div class="label">Current Level</div><div id="levelVal" class="val">1</div></div>
        <div class="stat-item"><div class="label">Current Points</div><div id="scoreVal" class="val">0</div></div>
        <div class="stat-item"><div class="label">Target</div><div id="targetVal" class="val">100</div></div>
    </div>

    <div class="main-layout">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
            <div id="court" class="court"></div>
            <div style="margin-top:20px; display:flex; gap:15px;">
                <button id="startBtn" style="background:var(--accent); color:#000;">SERVE</button>
                <button id="stopBtn" style="background:#ef4444; color:#fff;">END SESSION</button>
            </div>
        </div>
        <div class="reward-reel-container">
            <div id="rewardReel"></div>
        </div>
    </div>

    <script>
        // --- DATA PERSISTENCE LOGIC ---
        let careerData = JSON.parse(localStorage.getItem('badmintonProData')) || {
            points: 0,
            level: 1,
            misses: 0,
            timePlayed: 0,
            target: 100
        };

        function saveData() {
            localStorage.setItem('badmintonProData', JSON.stringify(careerData));
            updateCareerUI();
        }

        function updateCareerUI() {
            document.getElementById('totalTime').textContent = Math.floor(careerData.timePlayed / 60) + "m " + (careerData.timePlayed % 60) + "s";
            document.getElementById('totalMisses').textContent = careerData.misses;
            document.getElementById('lifePoints').textContent = Math.floor(careerData.points);
            document.getElementById('levelVal').textContent = careerData.level;
            document.getElementById('scoreVal').textContent = Math.floor(careerData.points);
            document.getElementById('targetVal').textContent = careerData.target;
            
            // Adjust reel position to saved level
            reel.style.transform = `translateY(${careerData.level * 130}px)`;
        }

        function resetAllData() {
            if(confirm("Are you sure? This will delete all levels, points, and rewards!")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- GAME ENGINE ---
        const court = document.getElementById('court');
        const reel = document.getElementById('rewardReel');
        let cells = [], rewards = [], itemPool = [];
        let activeIdx = -1, prevIdx = -1, isRunning = false, hasHit = false;
        let gameTimeout, timeTracker;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Init Cells
        for (let i = 0; i < 48; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.addEventListener('mouseenter', handleHover);
            court.appendChild(cell);
            cells.push(cell);
        }

        // Init Rewards
        for (let i = 0; i < 100; i++) {
            const src = `https://loremflickr.com/300/300/luxury?lock=${i}`;
            itemPool.push(src);
            const div = document.createElement('div');
            div.className = 'reward-item';
            div.innerHTML = `<img src="${src}">`;
            reel.appendChild(div);
            rewards.push(div);
        }

        function playSound(freq, type, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function handleHover(e) {
            if (!isRunning) return;
            const idx = cells.indexOf(e.target);
            if (idx === activeIdx && !hasHit) {
                // Distance Based Points
                const x1 = prevIdx % 12, y1 = Math.floor(prevIdx / 12);
                const x2 = idx % 12, y2 = Math.floor(idx / 12);
                const dist = (prevIdx === -1) ? 1 : Math.abs(x1 - x2) + Math.abs(y1 - y2);
                
                careerData.points += dist;
                hasHit = true;
                e.target.classList.add('hit');
                playSound(900, 'sine', 0.1);
                
                if (careerData.points >= careerData.target) levelUp();
                saveData();
            }
        }

        function levelUp() {
            careerData.level++;
            careerData.target = Math.floor(careerData.target * 1.1) + 100;
            showPopup("LEVEL " + careerData.level, itemPool[careerData.level % 100], "New Goal: " + careerData.target);
            saveData();
        }

        function showPopup(title, img, sub) {
            isRunning = false;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalSub').textContent = sub;
            document.getElementById('infoModal').style.display = 'flex';
            playSound(440, 'square', 0.5);
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
            isRunning = true;
            gameLoop();
        }

        function gameLoop() {
            if (!isRunning) return;

            // If box wasn't hit before moving, it's a MISS
            if (activeIdx !== -1 && !hasHit) {
                careerData.misses++;
                saveData();
            }

            cells.forEach(c => c.classList.remove('active', 'hit'));
            prevIdx = activeIdx;
            let next;
            do { next = Math.floor(Math.random() * 48); } while (next === activeIdx);
            activeIdx = next;
            hasHit = false;
            cells[activeIdx].classList.add('active');
            playSound(150, 'triangle', 0.2); 
            
            gameTimeout = setTimeout(gameLoop, 1000 * (0.6 + Math.random()));
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            // Record time every second
            timeTracker = setInterval(() => {
                careerData.timePlayed++;
                saveData();
            }, 1000);
            gameLoop();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            isRunning = false;
            clearInterval(timeTracker);
            clearTimeout(gameTimeout);
            saveData();
        });

        // Initialize UI from memory on load
        updateCareerUI();
    </script>
</body>
</html>
